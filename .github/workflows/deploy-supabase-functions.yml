name: Deploy Supabase Edge Functions

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - 'supabase/config.toml'
  workflow_dispatch:

concurrency:
  group: deploy-supabase-functions
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_ID: nmgiyvauguilbwtqlexj
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy all edge functions
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::warning::SUPABASE_ACCESS_TOKEN not set — skip deploy. See DEPLOY.md"
            exit 0
          fi
          for dir in supabase/functions/*/; do
            name=$(basename "$dir")
            if [ "$name" = "_shared" ]; then
              echo "Skipping shared module $name"
              continue
            fi
            echo "Deploying $name..."
            supabase functions deploy "$name" --project-ref "$PROJECT_ID"
          done
