<!doctype html>
<html lang="en" translate="no" class="notranslate">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="google" content="notranslate" />
    <title>VelvetBazzar - Buy & Sell Fashion, Vintage & Handmade | UK Marketplace</title>
    <meta name="description" content="Join thousands buying and selling fashion, vintage, handmade items and more on the UK's trusted peer-to-peer marketplace. Secure payments, fast shipping." />
    <meta name="author" content="VelvetBazzar" />

    <link rel="canonical" href="https://velvetbazzar.co.uk/" />

    <meta property="og:title" content="VelvetBazzar - Buy & Sell with Confidence" />
    <meta property="og:description" content="Join thousands buying and selling fashion, vintage, handmade items and more on the UK's trusted marketplace." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://velvetbazzar.co.uk/" />
    <meta property="og:image" content="https://velvetbazzar.co.uk/og-image.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="VelvetBazzar - UK Marketplace" />
    <meta name="twitter:description" content="Buy & sell fashion, vintage, handmade and more in the UK." />
    <meta name="twitter:image" content="https://velvetbazzar.co.uk/og-image.png" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "VelvetBazzar",
        "url": "https://velvetbazzar.co.uk/",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://velvetbazzar.co.uk/products?search={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>
  </head>

  <body>
    <style>
      #static-fallback[hidden] { display: none !important; }
    </style>
    <div id="root"></div>
    <div id="static-fallback" hidden>
      <main style="min-height:100vh;background:#ffffff;color:#111827;font-family:Arial,Helvetica,sans-serif;padding:32px 20px;box-sizing:border-box;">
        <section style="max-width:720px;margin:0 auto;text-align:center;padding-top:48px;">
          <div style="display:inline-block;width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,#4f46e5,#06b6d4);margin-bottom:18px;"></div>
          <h1 style="font-size:clamp(36px,10vw,72px);line-height:1.05;margin:0 0 16px;font-weight:800;letter-spacing:0;">VelvetBazzar</h1>
          <p style="font-size:20px;line-height:1.55;margin:0 auto 28px;max-width:560px;color:#374151;">Buy and sell fashion, vintage, handmade items and more in the UK.</p>
          <a href="/products" style="display:inline-block;background:#16a34a;color:#ffffff;text-decoration:none;font-weight:700;border-radius:12px;padding:16px 28px;margin:8px;">Browse products</a>
          <a href="/sell" style="display:inline-block;background:#4f46e5;color:#ffffff;text-decoration:none;font-weight:700;border-radius:12px;padding:16px 28px;margin:8px;">Start selling</a>
          <p style="margin-top:28px;color:#6b7280;font-size:14px;">VelvetBazzar.co.uk</p>
        </section>
      </main>
    </div>
    <noscript>
      <main style="min-height:100vh;background:#ffffff;color:#111827;font-family:Arial,Helvetica,sans-serif;padding:32px 20px;text-align:center;box-sizing:border-box;">
        <h1 style="font-size:44px;margin:48px 0 16px;">VelvetBazzar</h1>
        <p style="font-size:18px;color:#374151;">Please enable JavaScript to use the marketplace.</p>
      </main>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
